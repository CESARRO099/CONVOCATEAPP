<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>Convocate</title>
<meta name="theme-color" content="#123B4A" />
<link rel="manifest" href="./manifest.json" />
<link rel="icon" href="./icon.png" type="image/png" />
<link rel="apple-touch-icon" href="./icon.png" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600;9..144,700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
<style>
  :root{
    --bg: #F4F1EC;
    --surface: #FFFFFF;
    --ink: #17262B;
    --ink-soft: #5B6B70;
    --primary: #123B4A;
    --primary-soft: #E7EEEF;
    --accent: #E8A33D;
    --accent-soft: #FBEBD1;
    --ok: #3B7A57;
    --ok-soft: #E3F0E8;
    --line: #E4DFD5;
    --radius: 18px;
  }
  *{box-sizing:border-box}
  html,body{margin:0;padding:0}
  body{
    background: var(--bg);
    color: var(--ink);
    font-family: "Inter", system-ui, sans-serif;
    min-height:100vh;
    -webkit-tap-highlight-color: transparent;
  }
  header.top{
    background: var(--surface);
    color: var(--ink);
    padding: 20px 20px 24px;
    border-radius: 0 0 24px 24px;
    border-bottom: 1px solid var(--line);
    position: relative;
    overflow:hidden;
    text-align: center;
  }
  header.top img.logo{
    max-width: 240px;
    width: 100%;
    height: auto;
    display: block;
    margin: 0 auto 6px;
  }
  header.top h1{
    font-family:"Fraunces", serif;
    font-weight:600;
    font-size: 1.4rem;
    margin: 0 0 4px;
    letter-spacing:-0.01em;
  }
  header.top p{
    margin:0;
    font-size:0.82rem;
    color: var(--ink-soft);
  }
  main{ max-width: 960px; margin: 0 auto; padding: 16px 14px 60px; }

  .card{
    background: var(--surface);
    border-radius: var(--radius);
    border: 1px solid var(--line);
    padding: 16px;
    margin-bottom: 14px;
  }
  label.field-label{
    display:block;
    font-size: 0.7rem;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    color: var(--ink-soft);
    margin-bottom: 8px;
    font-weight: 600;
  }
  select{
    width:100%;
    padding: 11px 14px;
    border-radius: 12px;
    border: 1.5px solid var(--line);
    background: var(--bg);
    font-family: inherit;
    font-size: 0.95rem;
    color: var(--ink);
    appearance: none;
  }
  .empresa-pill{
    display:inline-block;
    margin-top:10px;
    font-size:0.7rem;
    font-weight:600;
    padding: 4px 10px;
    border-radius: 999px;
    background: var(--primary-soft);
    color: var(--primary);
  }
  .banner-turno{
    display:flex; align-items:center; gap:10px;
    background: var(--ok-soft);
    border-radius: var(--radius);
    padding: 12px 14px;
    margin-bottom: 14px;
    font-size: 0.85rem;
    color: var(--ok);
    font-weight: 500;
  }
  .banner-turno .dot{
    width:9px; height:9px; border-radius:50%; background: var(--ok); flex:0 0 auto;
  }
  .horas-wrap{ margin-bottom: 14px; }
  .horas-row{
    display:flex; justify-content:space-between; font-size:0.75rem; color:var(--ink-soft); margin-bottom:5px;
  }
  .horas-bar{ height:6px; background:var(--line); border-radius:4px; overflow:hidden; }
  .horas-fill{ height:100%; background: var(--accent); }

  .tabs{
    display:flex; gap:6px; overflow-x:auto; padding-bottom:6px; margin-bottom:12px;
    -webkit-overflow-scrolling: touch;
  }
  .tab{
    flex:0 0 auto; padding:7px 14px; border-radius:999px; font-size:0.78rem;
    background: transparent; color: var(--ink-soft); border:1px solid var(--line);
    cursor:pointer; white-space:nowrap;
  }
  .tab.active{ background: var(--primary); color:#fff; border-color:var(--primary); }

  table.grilla{
    border-collapse:collapse; font-size:0.78rem;
  }
  table.grilla td, table.grilla th{
    padding: 4px 6px; text-align:center; vertical-align:middle;
    color: #000; overflow:hidden; white-space:nowrap;
    background:#fff;
  }
  td.gris{ background:#A6A6A6 !important; }
  td.libre-texto{ color: var(--ok); font-weight:700; }
  button.btn-elegir{
    width:100%; border:1px solid #000; border-radius:0; padding:3px 1px;
    background: var(--ok); color:#fff; font-family:inherit; font-size:0.7rem; font-weight:700;
    cursor:pointer;
  }
  button.btn-elegir:active{ opacity:0.8; }
  .status-msg{ font-size:0.8rem; color: var(--ink-soft); text-align:center; padding: 20px 10px; }
  footer.hint{ text-align:center; font-size: 0.72rem; color: var(--ink-soft); padding: 10px 24px 4px; }
</style>
</head>
<body>

<header class="top">
  <img class="logo" src="./logo-completo.png" alt="ConvocaTE - Asociación Española" />
  <p>Servicio de Imagenología</p>
</header>

<main>
  <div class="card">
    <label class="field-label" for="persona-select">Elegí tu nombre</label>
    <select id="persona-select">
      <option value="">Cargando personas…</option>
    </select>
    <div id="empresa-pill-wrap"></div>
    <button id="btn-notif" style="display:none; margin-top:14px; width:100%; padding:12px 14px; border:none; border-radius:12px; background:var(--primary); color:#fff; font-family:inherit; font-size:0.92rem; font-weight:600;">
      Activar notificaciones
    </button>
    <div id="notif-status" class="detalle" style="margin-top:8px; text-align:center; font-size:0.8rem; color:var(--ink-soft);"></div>
  </div>

  <div id="convocatoria-wrap" style="display:none;">
    <div id="banner-turno-wrap"></div>
    <div class="horas-wrap">
      <div class="horas-row"><span>Horas este mes</span><span id="horas-texto">0 / 80 hs</span></div>
      <div class="horas-bar"><div class="horas-fill" id="horas-fill" style="width:0%"></div></div>
    </div>
    <div class="tabs" id="tabs-wrap"></div>
    <div class="card" style="overflow-x:auto;">
      <div id="grilla-wrap"><div class="status-msg">Elegí un sector arriba</div></div>
    </div>
  </div>

  <div id="resultado"></div>
</main>

<footer class="hint">Octubre 2026 · datos en vivo desde Supabase</footer>

<script>
// =========================================================
// CONFIGURACIÓN
// =========================================================
const SUPABASE_URL = "https://lcnvdgjedxikpqxxyzqr.supabase.co";
const SUPABASE_ANON_KEY = "sb_publishable_HAAHgNldQ3_wJH0EDrq3DA_u04xA7Yd";
const MES_ACTUAL = "2026-10"; // mes que se muestra (formato YYYY-MM)
// =========================================================

const personaSelect = document.getElementById("persona-select");
const resultadoDiv = document.getElementById("resultado");
const pillWrap = document.getElementById("empresa-pill-wrap");
const convocatoriaWrap = document.getElementById("convocatoria-wrap");
const bannerWrap = document.getElementById("banner-turno-wrap");
const horasTexto = document.getElementById("horas-texto");
const horasFill = document.getElementById("horas-fill");
const tabsWrap = document.getElementById("tabs-wrap");
const grillaWrap = document.getElementById("grilla-wrap");

let personaActual = null;      // { id, apellido, nombre, empresa }
let procesosActivos = [];      // procesos_convocatoria ACTIVO
let sectorActual = null;
let sectoresPorNombre = {};    // nombre -> { grupo, franjas: [{id,nombre}] }
let turnosDelMes = [];         // todos los turnos de MES_ACTUAL, ya "enriquecidos"
let hojasExcelCache = {};      // nombre de sector -> estructura ya cargada desde hojas_excel

async function sb(path, opts = {}) {
  const res = await fetch(`${SUPABASE_URL}/rest/v1/${path}`, {
    ...opts,
    headers: {
      "apikey": SUPABASE_ANON_KEY,
      "Authorization": `Bearer ${SUPABASE_ANON_KEY}`,
      ...(opts.body ? { "Content-Type": "application/json" } : {}),
      ...(opts.headers || {})
    }
  });
  if (!res.ok) throw new Error(`Error en ${path}: ${res.status} ${await res.text()}`);
  const text = await res.text();
  return text ? JSON.parse(text) : null;
}

function nombreEmpresa(e) { return e === "ESPANOLA" ? "ESPAÑOLA" : e; }
function nombreCompleto(p) { return [p.nombre, p.apellido].filter(Boolean).join(" ") || p.apellido; }

// ---------------------------------------------------------
// Carga inicial: personas para el selector
// ---------------------------------------------------------
async function cargarPersonas() {
  try {
    const personas = await sb("perfiles?select=id,ficha,apellido,nombre,empresa&order=apellido.asc");
    personaSelect.innerHTML = `<option value="">Seleccioná...</option>` +
      personas.map(p => `<option value="${p.id}">${nombreCompleto(p)} (${nombreEmpresa(p.empresa)})</option>`).join("");
    window.__personas = personas;
  } catch (e) {
    personaSelect.innerHTML = `<option value="">Error de conexión</option>`;
    resultadoDiv.innerHTML = `<div class="status-msg">No se pudo conectar a Supabase: ${e.message}</div>`;
  }
}

// ---------------------------------------------------------
// Al elegir una persona: cargar todo lo necesario para la
// pantalla de convocatoria
// ---------------------------------------------------------
personaSelect.addEventListener("change", async (e) => {
  const personaId = e.target.value;
  actualizarBotonNotif(personaId);
  if (!personaId) {
    convocatoriaWrap.style.display = "none";
    pillWrap.innerHTML = "";
    return;
  }
  personaActual = (window.__personas || []).find(p => p.id === personaId);
  if (personaActual) {
    pillWrap.innerHTML = `<span class="empresa-pill">${nombreEmpresa(personaActual.empresa)}${personaActual.ficha ? " · ficha " + personaActual.ficha : ""}</span>`;
  }
  convocatoriaWrap.style.display = "block";
  grillaWrap.innerHTML = `<div class="status-msg">Cargando...</div>`;
  await cargarDatosConvocatoria();
});

async function cargarDatosConvocatoria() {
  try {
    const [sectores, franjas, procesos, horas] = await Promise.all([
      sb("sectores?select=id,nombre,grupo"),
      sb("franjas_horarias?select=id,nombre,sector_id,es_reten&order=id.asc"),
      sb("procesos_convocatoria?select=grupo,tipo,estado,persona_actual_id,turno_vence&estado=eq.ACTIVO"),
      sb(`rpc/calcular_horas_acumuladas`, {
        method: "POST",
        body: JSON.stringify({ p_persona_id: personaActual.id, p_mes: `${MES_ACTUAL}-01` })
      })
    ]);

    sectoresPorNombre = {};
    for (const s of sectores) {
      sectoresPorNombre[s.nombre] = { grupo: s.grupo, franjas: franjas.filter(f => f.sector_id === s.id) };
    }
    procesosActivos = procesos;

    // Horas acumuladas
    const horasNum = Number(horas) || 0;
    horasTexto.textContent = `${horasNum.toFixed(1)} / 80 hs`;
    horasFill.style.width = Math.min(100, (horasNum / 82) * 100) + "%";

    // Banner de turno: ¿hay algún proceso donde persona_actual_id sea esta persona?
    const miProceso = procesosActivos.find(p => p.persona_actual_id === personaActual.id);
    if (miProceso) {
      const vence = new Date(miProceso.turno_vence);
      bannerWrap.innerHTML = `<div class="banner-turno"><span class="dot"></span>
        Es tu turno en ${miProceso.grupo}${miProceso.tipo === "NOCHEROS" ? " (guardias)" : ""} —
        podés elegir hasta las ${vence.toLocaleTimeString("es-UY", { hour: "2-digit", minute: "2-digit" })}</div>`;
    } else {
      bannerWrap.innerHTML = "";
    }

    // Traer TODOS los turnos del mes, paginando de a 1000 para no perder
    // registros por el limite por defecto de Supabase
    turnosDelMes = [];
    let desde = 0;
    while (true) {
      const pagina = await sb(
        `turnos?select=id,fecha,persona_id,nombre_externo,origen_vacante,` +
        `franjas_horarias(nombre,sector_id,sectores(nombre)),perfiles(apellido,nombre)` +
        `&fecha=gte.${MES_ACTUAL}-01&fecha=lte.${MES_ACTUAL}-31&order=id.asc`,
        { headers: { "Range-Unit": "items", "Range": `${desde}-${desde + 999}` } }
      );
      if (!pagina || !pagina.length) break;
      turnosDelMes.push(...pagina);
      if (pagina.length < 1000) break;
      desde += 1000;
    }

    renderTabs();
  } catch (e) {
    grillaWrap.innerHTML = `<div class="status-msg">Error cargando datos: ${e.message}</div>`;
  }
}

function renderTabs() {
  const nombres = Object.keys(sectoresPorNombre).sort();
  tabsWrap.innerHTML = nombres.map(n =>
    `<button class="tab${n === sectorActual ? " active" : ""}" data-sector="${n}">${n}</button>`
  ).join("");
  tabsWrap.querySelectorAll(".tab").forEach(btn => {
    btn.addEventListener("click", () => {
      sectorActual = btn.dataset.sector;
      renderTabs();
      renderGrilla();
    });
  });
  if (!sectorActual && nombres.length) {
    sectorActual = nombres[0];
    renderTabs();
  }
  if (sectorActual) renderGrilla();
}

function miGrupoHabilitadoAhora() {
  // Devuelve el grupo (TC/RESO/RESTO) donde a esta persona le toca elegir AHORA, o null
  const proc = procesosActivos.find(p => p.persona_actual_id === personaActual.id);
  return proc ? proc.grupo : null;
}

// Convierte el ancho de columna de Excel a pixeles (aproximado)
function anchoExcelAPx(w) {
  return Math.round((w || 8) * 7 + 5);
}

// Busca hacia arriba, dentro de las filas de encabezado (antes de first_day_row),
// el texto mas cercano en esa columna (para matchear contra franjas_horarias.nombre)
function textoEncabezado(estructura, col) {
  for (let r = estructura.first_day_row - 1; r >= 0; r--) {
    const v = estructura.filas[r][col]?.v;
    if (v && String(v).trim() !== "") return String(v).trim();
  }
  return "";
}

async function renderGrilla() {
  grillaWrap.innerHTML = `<div class="status-msg">Cargando planilla...</div>`;

  let estructura = hojasExcelCache[sectorActual];
  if (!estructura) {
    const filas2 = await sb(`hojas_excel?select=estructura&sector=eq.${sectorActual}`);
    if (!filas2 || !filas2.length) {
      grillaWrap.innerHTML = `<div class="status-msg">No hay estructura cargada para ${sectorActual}.</div>`;
      return;
    }
    estructura = filas2[0].estructura;
    hojasExcelCache[sectorActual] = estructura;
  }

  const info = sectoresPorNombre[sectorActual];
  const grupoHabilitado = miGrupoHabilitadoAhora();
  const puedoElegirAca = info && grupoHabilitado === info.grupo;

  // Indexar turnos de este sector por (dia, nombre de franja)
  const porCeldaReal = {};
  for (const t of turnosDelMes) {
    if (!t.franjas_horarias || t.franjas_horarias.sectores?.nombre !== sectorActual) continue;
    const dia = Number(t.fecha.slice(8, 10));
    porCeldaReal[`${dia}-${t.franjas_horarias.nombre}`] = t;
  }

  const { cols, merges, filas, dia_col, first_day_row, last_day_row, ultima_col_planilla, ultima_col_real, primera_col_planilla } = estructura;

  // Limite real de columnas con contenido (evita la cola vacia que arrastran
  // algunas hojas de Excel, ej. BQ/EMERG/POLI/SOLY llegan a Z aunque la
  // planilla real termine mucho antes). Si el sector todavia no tiene estos
  // limites cargados en Supabase, se usa cols.length como antes (sin recorte).
  const totalCols = (typeof ultima_col_real === "number") ? ultima_col_real + 1 : cols.length;
  // Rango de columnas hasta donde llega el bordeado real de la tabla (para no
  // pintar de gris ni la columna A de margen a la izquierda -sin borde en el
  // Excel original- ni la columna de notas / relleno vacio a la derecha).
  const limiteGris = (typeof ultima_col_planilla === "number") ? ultima_col_planilla : (totalCols - 1);
  const primeraColGris = (typeof primera_col_planilla === "number") ? primera_col_planilla : 0;

  // Marcar que celdas quedan "cubiertas" por una combinacion (merge), y el
  // tamaño de colspan/rowspan que corresponde al ancla de cada combinacion
  const cubierta = new Set();
  const ancla = {}; // "r-c" -> {rowspan, colspan}
  for (const m of merges) {
    const r1 = m.r1 - 1, c1 = m.c1 - 1, r2 = m.r2 - 1, c2 = m.c2 - 1;
    ancla[`${r1}-${c1}`] = { rowspan: r2 - r1 + 1, colspan: c2 - c1 + 1 };
    for (let r = r1; r <= r2; r++) {
      for (let c = c1; c <= c2; c++) {
        if (r === r1 && c === c1) continue;
        cubierta.add(`${r}-${c}`);
      }
    }
  }

  let html = `<table class="grilla"><colgroup>`;
  for (const w of cols.slice(0, totalCols)) html += `<col style="width:${anchoExcelAPx(w)}px">`;
  html += `</colgroup><tbody>`;

  for (let r = 0; r < filas.length; r++) {
    const esFilaDeDia = r >= first_day_row && r <= last_day_row;
    let dia = null;
    let grisFila = false;
    if (esFilaDeDia) {
      dia = filas[r][dia_col].v;
      const fechaStr = `${MES_ACTUAL}-${String(dia).padStart(2, "0")}`;
      const d = new Date(fechaStr + "T12:00:00");
      const diaSemana = ((d.getDay() + 6) % 7) + 1; // 1=Lunes...7=Domingo
      const esFinde = diaSemana === 6 || diaSemana === 7;
      const esFeriado = dia === 12 && sectorActual !== 'BSE';
      grisFila = esFinde || esFeriado;
    }

    html += `<tr>`;
    for (let c = 0; c < totalCols; c++) {
      if (cubierta.has(`${r}-${c}`)) continue;
      const celda = filas[r][c];
      const span = ancla[`${r}-${c}`];
      const attrs = span ? ` rowspan="${span.rowspan}" colspan="${span.colspan}"` : "";
      const bd = celda.bd;
      const borderStyle = `border-top:${bd.t ? "1px solid #000" : "none"};border-bottom:${bd.b ? "1px solid #000" : "none"};border-left:${bd.l ? "1px solid #000" : "none"};border-right:${bd.r ? "1px solid #000" : "none"};`;
      const boldStyle = celda.bold ? "font-weight:700;" : "";

      let contenido = celda.v ?? "";
      let clases = "";

      if (esFilaDeDia && celda.y) {
        // Celda marcada amarilla en el Excel = hay que ofrecerla
        const franjaTexto = textoEncabezado(estructura, c);
        const t = porCeldaReal[`${dia}-${franjaTexto}`];
        if (t && (t.persona_id || t.nombre_externo)) {
          contenido = t.perfiles ? t.perfiles.apellido : t.nombre_externo;
        } else if (puedoElegirAca && t) {
          contenido = `<button class="btn-elegir" data-turno-id="${t.id}">Elegir</button>`;
        } else {
          contenido = "LIBRE";
          clases += " libre-texto";
        }
      }

      if (grisFila && c >= primeraColGris && c <= limiteGris) clases += " gris";

      html += `<td${attrs} style="${borderStyle}${boldStyle}" class="${clases.trim()}">${contenido}</td>`;
    }
    html += `</tr>`;
  }
  html += `</tbody></table>`;
  grillaWrap.innerHTML = html;

  grillaWrap.querySelectorAll(".btn-elegir").forEach(btn => {
    btn.addEventListener("click", () => elegirTurno(Number(btn.dataset.turnoId)));
  });
}

async function elegirTurno(turnoId) {
  try {
    const ok = await sb(`rpc/tomar_turno`, {
      method: "POST",
      body: JSON.stringify({ p_turno_id: turnoId, p_persona_id: personaActual.id })
    });
    if (ok === true) {
      await cargarDatosConvocatoria(); // refresca todo (horas, banner, grilla)
    } else {
      alert("No se pudo tomar ese turno — puede que ya no esté vacante, o que ya no sea tu turno.");
      await cargarDatosConvocatoria();
    }
  } catch (e) {
    alert("Error al elegir el turno: " + e.message);
  }
}

// ---------------------------------------------------------
// Notificaciones push
// ---------------------------------------------------------
const VAPID_PUBLIC_KEY = "BHNTEZRf4uqYFfr_IqFMk6e8w6gcg115m7FRausnVsGjM6e7u48Ec1w-H7KouhwMFmXsuQm1x5WN5O1a37E9HSM";
const btnNotif = document.getElementById("btn-notif");
const notifStatus = document.getElementById("notif-status");
let swRegistration = null;

function urlBase64ToUint8Array(base64String) {
  const padding = "=".repeat((4 - (base64String.length % 4)) % 4);
  const base64 = (base64String + padding).replace(/-/g, "+").replace(/_/g, "/");
  const raw = atob(base64);
  return Uint8Array.from([...raw].map((c) => c.charCodeAt(0)));
}

function actualizarBotonNotif(personaId) {
  if (!personaId || !("serviceWorker" in navigator) || !("PushManager" in window)) {
    btnNotif.style.display = "none";
    return;
  }
  btnNotif.style.display = "block";
  notifStatus.textContent = "";
}

async function activarNotificaciones() {
  const personaId = personaSelect.value;
  if (!personaId) return;
  notifStatus.textContent = "Activando...";
  try {
    const permiso = await Notification.requestPermission();
    if (permiso !== "granted") {
      notifStatus.textContent = "No diste permiso para notificaciones.";
      return;
    }
    if (!swRegistration) swRegistration = await navigator.serviceWorker.ready;
    let sub = await swRegistration.pushManager.getSubscription();
    if (!sub) {
      sub = await swRegistration.pushManager.subscribe({
        userVisibleOnly: true,
        applicationServerKey: urlBase64ToUint8Array(VAPID_PUBLIC_KEY)
      });
    }
    const subJson = sub.toJSON();
    await fetch(`${SUPABASE_URL}/rest/v1/push_subscriptions`, {
      method: "POST",
      headers: {
        "apikey": SUPABASE_ANON_KEY,
        "Authorization": `Bearer ${SUPABASE_ANON_KEY}`,
        "Content-Type": "application/json",
        "Prefer": "resolution=merge-duplicates"
      },
      body: JSON.stringify({
        persona_id: personaId,
        endpoint: subJson.endpoint,
        p256dh: subJson.keys.p256dh,
        auth: subJson.keys.auth
      })
    });
    notifStatus.textContent = "✓ Notificaciones activadas";
  } catch (e) {
    notifStatus.textContent = "Error: " + e.message;
  }
}
