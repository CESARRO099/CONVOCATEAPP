<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>Convocate</title>
<meta name="theme-color" content="#123B4A" />
<link rel="manifest" href="./manifest.json" />
<link rel="icon" href="./icon.png" type="image/png" />
<link rel="apple-touch-icon" href="./icon.png" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600;9..144,700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
<style>
  :root{
    --bg: #F4F1EC;
    --surface: #FFFFFF;
    --ink: #17262B;
    --ink-soft: #5B6B70;
    --primary: #123B4A;
    --primary-soft: #E7EEEF;
    --accent: #E8A33D;
    --accent-soft: #FBEBD1;
    --ok: #3B7A57;
    --ok-soft: #E3F0E8;
    --line: #E4DFD5;
    --radius: 18px;
  }
  *{box-sizing:border-box}
  html,body{margin:0;padding:0}
  body{
    background: var(--bg);
    color: var(--ink);
    font-family: "Inter", system-ui, sans-serif;
    min-height:100vh;
    -webkit-tap-highlight-color: transparent;
  }
  header.top{
    background: var(--surface);
    color: var(--ink);
    padding: 20px 20px 24px;
    border-radius: 0 0 24px 24px;
    border-bottom: 1px solid var(--line);
    position: relative;
    overflow:hidden;
    text-align: center;
  }
  header.top img.logo{
    max-width: 240px;
    width: 100%;
    height: auto;
    display: block;
    margin: 0 auto 6px;
  }
  header.top h1{
    font-family:"Fraunces", serif;
    font-weight:600;
    font-size: 1.4rem;
    margin: 0 0 4px;
    letter-spacing:-0.01em;
  }
  header.top p{
    margin:0;
    font-size:0.82rem;
    color: var(--ink-soft);
  }
  main{ max-width: 680px; margin: 0 auto; padding: 16px 14px 60px; }

  .card{
    background: var(--surface);
    border-radius: var(--radius);
    border: 1px solid var(--line);
    padding: 16px;
    margin-bottom: 14px;
  }
  label.field-label{
    display:block;
    font-size: 0.7rem;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    color: var(--ink-soft);
    margin-bottom: 8px;
    font-weight: 600;
  }
  select{
    width:100%;
    padding: 11px 14px;
    border-radius: 12px;
    border: 1.5px solid var(--line);
    background: var(--bg);
    font-family: inherit;
    font-size: 0.95rem;
    color: var(--ink);
    appearance: none;
  }
  .empresa-pill{
    display:inline-block;
    margin-top:10px;
    font-size:0.7rem;
    font-weight:600;
    padding: 4px 10px;
    border-radius: 999px;
    background: var(--primary-soft);
    color: var(--primary);
  }
  .banner-turno{
    display:flex; align-items:center; gap:10px;
    background: var(--ok-soft);
    border-radius: var(--radius);
    padding: 12px 14px;
    margin-bottom: 14px;
    font-size: 0.85rem;
    color: var(--ok);
    font-weight: 500;
  }
  .banner-turno .dot{
    width:9px; height:9px; border-radius:50%; background: var(--ok); flex:0 0 auto;
  }
  .horas-wrap{ margin-bottom: 14px; }
  .horas-row{
    display:flex; justify-content:space-between; font-size:0.75rem; color:var(--ink-soft); margin-bottom:5px;
  }
  .horas-bar{ height:6px; background:var(--line); border-radius:4px; overflow:hidden; }
  .horas-fill{ height:100%; background: var(--accent); }

  .tabs{
    display:flex; gap:6px; overflow-x:auto; padding-bottom:6px; margin-bottom:12px;
    -webkit-overflow-scrolling: touch;
  }
  .tab{
    flex:0 0 auto; padding:7px 14px; border-radius:999px; font-size:0.78rem;
    background: transparent; color: var(--ink-soft); border:1px solid var(--line);
    cursor:pointer; white-space:nowrap;
  }
  .tab.active{ background: var(--primary); color:#fff; border-color:var(--primary); }

  table.grilla{
    width:100%; border-collapse:collapse; font-size:0.72rem; table-layout:fixed;
    border: 2px solid #000;
  }
  table.grilla th{
    text-align:center; padding: 5px 3px; color: #000; font-weight:700;
    border: 1px solid #000; font-size:0.66rem; background:#fff;
  }
  table.grilla th:first-child, table.grilla th:last-child{ width: 28px; }
  table.grilla td{
    padding: 3px 2px; text-align:center; border: 1px solid #000;
    color: #000; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;
    background:#fff;
  }
  td.dia-num{
    background:#BDD7EE; color:#1F4E78; font-weight:700;
  }
  tr.sin-actividad td{ background:#A6A6A6; }
  tr.sin-actividad td.dia-num{
